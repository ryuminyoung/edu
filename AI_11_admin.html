<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 콘솔 - 데이터 실습 제어 타워</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #fdfbf7;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col">

    <!-- ========================================== -->
    <!-- 1. 패스워드 인증 화면 (기본 활성화) -->
    <!-- ========================================== -->
    <div id="auth-view" class="fixed inset-0 bg-[#fdfbf7] z-50 flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-3xl border border-slate-200 shadow-xl p-8 space-y-6 text-center">
            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto text-xl shadow-sm">
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="space-y-1">
                <h1 class="text-xl font-extrabold text-slate-800">관리자(강사) 인증</h1>
                <p class="text-xs text-slate-400">실시간 연수 환경 설정을 위해 비밀번호를 입력해 주세요.</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="auth-password" placeholder="비밀번호 입력" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 text-sm text-center focus:outline-none focus:border-indigo-500 focus:bg-white transition" value="2026">
                <button onclick="checkAdminAuth()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition text-sm shadow-md">
                    보안 접속하기
                </button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 2. 관리자 메인 컨트롤 타워 UI (인증 시 활성화) -->
    <!-- ========================================== -->
    <div id="admin-view" class="hidden flex-1 flex flex-col">
        <!-- Sticky Top Header -->
        <header class="sticky top-0 bg-white/95 backdrop-blur border-b border-slate-200/80 z-40 px-6 py-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
                    <i class="fa-solid fa-user-shield text-lg"></i>
                </div>
                <div>
                    <h1 class="text-sm font-black text-slate-900 tracking-tight">강사용 데이터 제어 타워</h1>
                    <p class="text-[10px] text-slate-400">원격 클래스 셋업 및 세미나 제어 콘솔</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <a href="AI_11_class.html" class="px-3.5 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold rounded-xl transition flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-right-to-bracket"></i> 실습실로 이동
                </a>
                <button onclick="logoutAdmin()" class="px-3.5 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-600 text-xs font-bold rounded-xl transition flex items-center gap-1">
                    <i class="fa-solid fa-power-off"></i> 로그아웃
                </button>
            </div>
        </header>

        <!-- Main Dashboard Workspace -->
        <main class="flex-1 max-w-5xl w-full mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- LEFT COLUMN: SEMINAR META & CLASS CREATION -->
            <div class="space-y-6">
                <!-- Seminar Title Configuration -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                    <h3 class="text-xs font-bold text-slate-800 tracking-wider uppercase border-b border-slate-100 pb-2 flex items-center gap-1.5">
                        <i class="fa-solid fa-pen-to-square text-indigo-500"></i> 연수(세미나) 대주제 설정
                    </h3>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">공식 연수 과정명</label>
                        <input type="text" id="config-seminar-title" placeholder="과정 타이틀 입력" class="w-full p-2.5 border border-slate-200 rounded-xl bg-slate-50 text-xs focus:outline-none focus:border-indigo-500 focus:bg-white transition">
                        <button onclick="updateSeminarTitle()" class="w-full py-2 bg-slate-800 hover:bg-slate-900 text-white font-bold text-xs rounded-xl transition flex items-center justify-center gap-1">
                            <i class="fa-solid fa-circle-check"></i> 과정명 실시간 수정 및 연동
                        </button>
                    </div>
                </div>

                <!-- Create Dynamic Classes and Group Limits -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                    <h3 class="text-xs font-bold text-slate-800 tracking-wider uppercase border-b border-slate-100 pb-2 flex items-center gap-1.5">
                        <i class="fa-solid fa-school-flag text-amber-500"></i> 신규 클래스 개설 및 모둠 셋업
                    </h3>
                    <div class="space-y-3">
                        <div class="space-y-1">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">클래스(반) 식별명</label>
                            <input type="text" id="class-input-name" placeholder="예: 2기 중등 선도교사과정" class="w-full p-2.5 border border-slate-200 rounded-xl bg-slate-50 text-xs focus:outline-none focus:border-indigo-500 focus:bg-white transition">
                        </div>
                        <div class="space-y-1">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">배정할 모둠 개수 (최대 20개)</label>
                            <input type="number" id="class-input-groups" value="5" min="1" max="20" class="w-full p-2.5 border border-slate-200 rounded-xl bg-slate-50 text-xs focus:outline-none focus:border-indigo-500 focus:bg-white transition">
                        </div>
                        <button onclick="createNewClass()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs rounded-xl transition shadow-sm flex items-center justify-center gap-1">
                            <i class="fa-solid fa-plus"></i> 연수 학급 개설하기
                        </button>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: EXISTING CLASSES & DATA CLEANUP -->
            <div class="space-y-6">
                <!-- Existing Classes Listing -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-3 flex flex-col h-[340px]">
                    <h3 class="text-xs font-bold text-slate-800 tracking-wider uppercase border-b border-slate-100 pb-2 flex items-center gap-1.5 shrink-0">
                        <i class="fa-solid fa-list-check text-indigo-500"></i> 현재 개설된 클래스 목록
                    </h3>
                    <div id="classes-list-container" class="space-y-2 overflow-y-auto flex-1 pr-1">
                        <p class="text-xs text-slate-400 italic">서버에서 실시간 클래스를 불러오는 중입니다...</p>
                    </div>
                </div>

                <!-- Batch Reset & Data Management -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                    <h3 class="text-xs font-bold text-rose-800 tracking-wider uppercase border-b border-rose-100 pb-2 flex items-center gap-1.5">
                        <i class="fa-solid fa-triangle-exclamation"></i> 주의: 전체 데이터 일괄 비우기
                    </h3>
                    <p class="text-[11px] text-slate-500 leading-relaxed">
                        다음 기수 연수 또는 새로운 세션 실습 배치를 위해 원격 저장소에 기록된 모둠별 산출물 데이터들을 일괄 클리닝 포맷팅합니다.
                    </p>
                    <button onclick="confirmResetAllData()" class="w-full py-2.5 bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs rounded-xl transition flex items-center justify-center gap-1 shadow-sm">
                        <i class="fa-solid fa-dumpster"></i> 원격 실습 데이터 전체 초기화
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- UI Toast Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 space-y-2 pointer-events-none"></div>

    <!-- Firebase Compat SDKs (규칙 준수 필수) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
        apiKey: "AIzaSyBGAFIDJ90L5i92dfFrrR5UdbpQxtmkzQE",
        authDomain: "ai-teacher-fbebf.firebaseapp.com",
        projectId: "ai-teacher-fbebf",
        storageBucket: "ai-teacher-fbebf.firebasestorage.app",
        messagingSenderId: "386839565220",
        appId: "1:386839565220:web:edc887ff7e0a493ce12731"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        let db, auth;
        let isFirebaseActive = false;

        if (firebaseConfig.apiKey) {
            try {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                isFirebaseActive = true;
                console.log("Firebase initialized in admin console.");
            } catch (err) {
                console.error("Firebase Initialization error.", err);
            }
        }

        let classesList = [];

        function checkAdminAuth() {
            const pwd = document.getElementById('auth-password').value;
            if (pwd === "2026") {
                if (!isFirebaseActive) {
                    showToast("오류: 파이어베이스 설정이 누락되었습니다.", "error");
                    return;
                }
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                showToast("원격 동기화 관리자 모드가 활성화되었습니다.", "success");
                initAdminDataSync();
            } else {
                showToast("비밀번호가 올바르지 않습니다.", "error");
            }
        }

        function logoutAdmin() {
            document.getElementById('auth-password').value = "";
            document.getElementById('auth-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
        }

        // RULE 3 준수: 익명 인증 완료 대기 후 쿼리 시작
        async function initAdminDataSync() {
            try {
                let userCredential;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    userCredential = await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    userCredential = await auth.signInAnonymously();
                }

                const user = userCredential.user;
                if (!user) {
                    showToast("인증 획득 실패", "error");
                    return;
                }

                console.log("Admin Firestore connected as:", user.uid);

                // 1. 세미나 메타 수신 (RULE 1 준수 하위 경로)
                db.collection('artifacts').doc(appId).collection('public').doc('data')
                    .collection('config').doc('seminar_meta').onSnapshot((doc) => {
                        if (doc.exists) {
                            document.getElementById('config-seminar-title').value = doc.data().title || "";
                        }
                    }, (err) => {
                        console.error("Seminar meta stream error: ", err);
                    });

                // 2. 클래스 목록 수신 (RULE 1 하위 경로 & RULE 2 복잡한 쿼리 회피)
                db.collection('artifacts').doc(appId).collection('public').doc('data')
                    .collection('classes').onSnapshot((snapshot) => {
                        let list = [];
                        snapshot.forEach((doc) => {
                            const d = doc.data();
                            list.push({ 
                                id: doc.id, 
                                name: d.name, 
                                groupCount: d.groupCount || 5,
                                createdAt: d.createdAt || 0
                            });
                        });
                        // RULE 2를 위해 메모리 정렬 수행
                        list.sort((a, b) => b.createdAt - a.createdAt);
                        classesList = list;
                        renderClassesList();
                    }, (err) => {
                        console.error("Classes stream error: ", err);
                        showToast("클래스를 불러오는 데 권한 실패가 발생했습니다.", "error");
                    });

            } catch (err) {
                console.error("Auth / Fetch initialization error inside admin panel.", err);
                let errorMsg = "원격 서버와의 연동 인증에 실패했습니다.";
                if (err.code === 'auth/operation-not-allowed') {
                    errorMsg = "파이어베이스 콘솔에서 '익명 로그인'을 활성화해 주셔야 합니다!";
                }
                showToast(errorMsg, "error");
            }
        }

        function updateSeminarTitle() {
            const titleVal = document.getElementById('config-seminar-title').value.trim();
            if (!titleVal) {
                showToast("세미나 과정명을 올바르게 입력해 주세요.", "error");
                return;
            }
            if (isFirebaseActive && auth.currentUser) {
                db.collection('artifacts').doc(appId).collection('public').doc('data')
                    .collection('config').doc('seminar_meta').set({ title: titleVal })
                    .then(() => showToast("전체 실습 페이지 과정 타이틀명이 변경되었습니다.", "success"))
                    .catch(e => showToast("서버 반영 실패", "error"));
            }
        }

        function createNewClass() {
            const nameVal = document.getElementById('class-input-name').value.trim();
            const groupCountVal = parseInt(document.getElementById('class-input-groups').value) || 5;

            if (!nameVal) {
                showToast("학급 구별 명칭을 작성해 주세요.", "error");
                return;
            }
            if (groupCountVal < 1 || groupCountVal > 20) {
                showToast("모둠 개수는 최소 1개, 최대 20개까지만 배정 가능합니다.", "error");
                return;
            }

            const cleanId = 'class_' + Date.now();

            if (isFirebaseActive && auth.currentUser) {
                db.collection('artifacts').doc(appId).collection('public').doc('data')
                    .collection('classes').doc(cleanId).set({
                        name: nameVal,
                        groupCount: groupCountVal,
                        createdAt: Date.now()
                    })
                    .then(() => {
                        showToast(`클래스 [${nameVal}] (${groupCountVal}개 모둠)가 원격 개설되었습니다.`, "success");
                        document.getElementById('class-input-name').value = "";
                        document.getElementById('class-input-groups').value = "5";
                    })
                    .catch(e => showToast("원격 클래스 등록에 실패했습니다.", "error"));
            }
        }

        function deleteClass(classId, className) {
            if (!confirm(`[${className}] 학급을 완전히 삭제하시겠습니까?\n모든 데이터가 소멸됩니다.`)) return;

            if (isFirebaseActive && auth.currentUser) {
                db.collection('artifacts').doc(appId).collection('public').doc('data')
                    .collection('classes').doc(classId).delete()
                    .then(() => showToast("선택한 클래스가 성공적으로 원격 삭제되었습니다.", "info"))
                    .catch(e => showToast("삭제 실패", "error"));
            }
        }

        // 모든 모둠의 자료들을 포맷팅 (Active listeners가 끊어지지 않도록 도큐먼트 리셋)
        function confirmResetAllData() {
            if (!confirm("🚨 경고!\n현재 데이터베이스에 누적된 전체 모둠의 실습 성찰 보고서 내용(모둠원, 관점, 처방 대안)이 완전히 사라지고 초기화됩니다. 이 동작은 복구할 수 없습니다.\n\n정말로 초기화하시겠습니까?")) return;

            if (isFirebaseActive && auth.currentUser) {
                db.collection('artifacts').doc(appId).collection('public').doc('data')
                    .collection('classes').get()
                    .then((snapshot) => {
                        let batch = db.batch();
                        snapshot.forEach((classDoc) => {
                            const classId = classDoc.id;
                            const groupCount = classDoc.data().groupCount || 5;
                            for (let i = 1; i <= groupCount; i++) {
                                const groupDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data')
                                    .collection('classes').doc(classId)
                                    .collection('groups').doc(`group${i}`);
                                batch.set(groupDocRef, {
                                    members: [],
                                    perspective: "",
                                    outliers: [],
                                    overallTry: ""
                                });
                            }
                        });
                        return batch.commit();
                    })
                    .then(() => {
                        showToast("원격 데이터베이스 내 모든 실습 자료들이 깔끔하게 포맷되었습니다.", "success");
                    })
                    .catch(e => showToast("원격 리셋 처리에 실패했습니다.", "error"));
            }
        }

        function renderClassesList() {
            const container = document.getElementById('classes-list-container');
            container.innerHTML = "";
            if (classesList.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 italic py-4">개설된 학급 정보가 없습니다. 새로 등록해 주세요.</p>`;
                return;
            }
            classesList.forEach(c => {
                container.innerHTML += `
                    <div class="flex items-center justify-between p-3.5 bg-slate-50 border border-slate-200/60 rounded-xl text-xs hover:bg-slate-100/50 transition">
                        <div class="space-y-0.5">
                            <h4 class="font-bold text-slate-800">${c.name}</h4>
                            <p class="text-[10px] text-indigo-600 font-bold"><i class="fa-solid fa-users-rectangle"></i> 모둠 개수: ${c.groupCount}개</p>
                        </div>
                        <button onclick="deleteClass('${c.id}', '${c.name}')" class="text-slate-400 hover:text-rose-600 transition p-1">
                            <i class="fa-solid fa-circle-xmark text-sm"></i>
                        </button>
                    </div>
                `;
            });
        }

        function showToast(message, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let icon = '<i class="fa-solid fa-circle-info text-sky-500"></i>';
            let bgBorder = 'bg-white border-slate-200';
            
            if (type === "success") {
                icon = '<i class="fa-solid fa-circle-check text-emerald-500"></i>';
            } else if (type === "error") {
                icon = '<i class="fa-solid fa-circle-exclamation text-rose-500"></i>';
            } else if (type === "warning") {
                icon = '<i class="fa-solid fa-triangle-exclamation text-amber-500"></i>';
            }

            toast.className = `p-4 rounded-xl border shadow-lg ${bgBorder} flex items-center gap-2 text-xs font-semibold max-w-sm pointer-events-auto transition duration-300 transform translate-y-2 opacity-0`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
